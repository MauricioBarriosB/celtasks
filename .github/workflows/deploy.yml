name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build
              env:
                  VITE_GET_INSTANCE: ${{ secrets.VITE_GET_INSTANCE }}
                  VITE_VALID_LICENSE_HASH: ${{ secrets.VITE_VALID_LICENSE_HASH }}
                  VITE_STORAGE_KEY: ${{ secrets.VITE_STORAGE_KEY }}
                  VITE_STORAGE_KEY_HASH: ${{ secrets.VITE_STORAGE_KEY_HASH }}
                  VITE_APP_API_URL: ${{ secrets.VITE_APP_API_URL }}
                  VITE_APP_API_SECRET: ${{ secrets.VITE_APP_API_SECRET }}

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: "./dist"

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
